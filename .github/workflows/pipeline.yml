name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile
        run: javac *.java

      - name: Automated Build Verification (Test)
        run: |
          if [ -f Main.class ]; then
            echo "Build verification passed: Main.class exists."
          else
            echo "Build verification failed: Main.class not found."
            exit 1
          fi
